name: Release DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 1.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    env:
      APP_NAME: KotaebaApp
      PROJECT_PATH: KotaebaApp/KotaebaApp.xcodeproj
      SCHEME: KotaebaApp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import Developer ID Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          CERT_PATH="${RUNNER_TEMP}/build_certificate.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"

          echo "${BUILD_CERTIFICATE_BASE64}" | base64 -D > "${CERT_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -P "${P12_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

      - name: Create ExportOptions.plist
        shell: bash
        run: |
          cat > "${RUNNER_TEMP}/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF

      - name: Archive App
        run: |
          xcodebuild archive \
            -project "${PROJECT_PATH}" \
            -scheme "${SCHEME}" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "${RUNNER_TEMP}/${APP_NAME}.xcarchive"

      - name: Export App
        run: |
          xcodebuild -exportArchive \
            -archivePath "${RUNNER_TEMP}/${APP_NAME}.xcarchive" \
            -exportPath "${RUNNER_TEMP}/export" \
            -exportOptionsPlist "${RUNNER_TEMP}/ExportOptions.plist"

      - name: Build DMG
        id: dmg
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH="${RUNNER_TEMP}/Kotaeba-${VERSION}.dmg"

          create-dmg \
            --overwrite \
            --volname "Kotaeba Installer" \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "${APP_NAME}.app" 220 190 \
            --app-drop-link 580 190 \
            "${DMG_PATH}" \
            "${RUNNER_TEMP}/export"

          echo "path=${DMG_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Code Sign DMG
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          codesign --force --timestamp --sign "${DEVELOPER_ID_APPLICATION}" "${{ steps.dmg.outputs.path }}"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool submit "${{ steps.dmg.outputs.path }}" \
            --apple-id "${APPLE_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --wait

      - name: Staple DMG
        run: xcrun stapler staple "${{ steps.dmg.outputs.path }}"

      - name: Generate SHA256
        id: sha
        shell: bash
        run: |
          SHA_VALUE="$(shasum -a 256 "${{ steps.dmg.outputs.path }}" | awk '{print $1}')"
          VERSION="${{ steps.version.outputs.version }}"
          SHA_FILE="${RUNNER_TEMP}/Kotaeba-${VERSION}.sha256.txt"
          echo "${SHA_VALUE}  Kotaeba-${VERSION}.dmg" > "${SHA_FILE}"
          echo "value=${SHA_VALUE}" >> "${GITHUB_OUTPUT}"
          echo "file=${SHA_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Kotaeba ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.dmg.outputs.path }}
            ${{ steps.sha.outputs.file }}
